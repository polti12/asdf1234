<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커뮤니티 | 로봇소프트웨어과 혁신 랩</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fo    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { overflow-y: auto; background: var(--bg-main); color: var(--text-primary); font-family: var(--font-main); }
        .board-container { max-width: 1200px; margin: 80px auto 80px; padding: 0 60px; }
        .board-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 60px; border-bottom: 1px solid var(--border-color); padding-bottom: 30px; }
        .board-title { font-size: 3rem; font-weight: 900; letter-spacing: -0.05em; text-transform: uppercase; }
        .board-count { 
            font-family: var(--font-mono); 
            background: var(--accent); 
            padding: 2px 10px; 
            margin-left: 15px; 
            font-size: 0.9rem; 
            font-weight: 700; 
            color: var(--text-primary);
        }
        
        .write-btn { 
            background: transparent; 
            border: 1px solid var(--text-primary); 
            color: var(--text-primary); 
            padding: 12px 32px; 
            border-radius: 4px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.3s; 
            font-family: var(--font-mono);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
        }
        .write-btn:hover { background: var(--text-primary); color: #fff; transform: translateY(-2px); }
 
        .write-section { 
            margin-top: 40px; 
            background: var(--bg-white); 
            padding: 60px; 
            border-radius: 4px; 
            border: 1px solid var(--text-primary); 
            display: none; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.05); 
        }
        .write-section.active { display: block; margin-bottom: 60px; }
        .form-group { margin-bottom: 35px; }
        .form-group label { display: block; margin-bottom: 12px; color: var(--text-primary); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; font-family: var(--font-mono); letter-spacing: 0.05em; }
        .form-group input, .form-group textarea { 
            width: 100%; 
            background: var(--bg-main); 
            border: 1px solid var(--border-color); 
            padding: 20px; 
            color: var(--text-primary); 
            border-radius: 0; 
            outline: none; 
            transition: 0.3s; 
            font-family: inherit; 
            font-size: 1rem; 
        }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--text-primary); background: #fff; }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="location.href='index.html'" style="cursor:pointer"><span class="logo-accent">ROBOT</span> S/W LAB.</div>
            <nav class="nav-links" style="position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 40px;">
                <a href="index.html" style="color: rgba(255,255,255,0.5); text-decoration: none; font-weight: 700; font-size: 0.9rem; letter-spacing: 0.1em;">HOME</a>
                <a href="board.html" style="color: #fff; text-decoration: none; font-weight: 700; font-size: 0.9rem; letter-spacing: 0.1em; border-bottom: 1px solid var(--accent);">COMMUNITY</a>
            </nav>
        </div>
    </header>

    <main class="board-container">
        <div class="board-header">
            <div>
                <h2 class="board-title">커뮤니티 <span class="board-count" id="count">0</span></h2>
                <p style="color:#555; margin-top:10px;">로봇소프트웨어과 학생들의 실시간 혁신 기록입니다.</p>
            </div>
            <button class="write-btn" id="toggleWrite">글쓰기</button>
        </div>

        <div class="write-section" id="writeForm">
            <div class="form-group">
                <label>제목</label>
                <input type="text" id="postTitle" placeholder="공유하고 싶은 소식을 입력하세요">
            </div>
            <div class="form-group">
                <label>작성자</label>
                <input type="text" id="postAuthor" placeholder="이름을 입력하세요">
            </div>
            <div class="form-group">
                <label>첨부할 캔버스 선택</label>
                <select id="boardSelect" style="width: 100%; height: 55px; border-radius: 14px; padding: 0 18px; background: var(--bg-hover); border: 1px solid transparent; color: var(--text-primary); font-family: inherit; font-size: 1rem; outline: none; cursor: pointer;">
                    <option value="">캔버스 선택 안 함</option>
                    <!-- script에서 동적 생성 -->
                </select>
                <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 8px;">선택한 캔버스의 현재 모습이 스냅샷으로 저장됩니다.</p>
            </div>
            <div class="form-group">
                <label>내용</label>
                <textarea id="postContent" rows="6" placeholder="상세 내용을 입력하세요"></textarea>
            </div>
            <div style="text-align: right;">
                <button class="primary-btn" id="savePost" style="padding:12px 40px; font-size:1rem; cursor:pointer; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-weight: 700; transition: 0.3s; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2);">등록하기</button>
            </div>
        </div>

        <div id="postCardContainer" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; margin-top: 40px;">
            <!-- posts will be rendered here as cards -->
        </div>

        <!-- 기존 테이블은 숨김 혹은 제거 -->
        <table class="board-list" style="display:none;">
            <tbody id="postList"></tbody>
        </table>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        // Unified Firebase Config (Main Project)
        const firebaseConfig = {
            apiKey: "AIzaSyCJAZ-QdPnygAxTt_RKH45Q7k-djU3KP4k",
            authDomain: "my-whiteboard-46af9.firebaseapp.com",
            databaseURL: "https://my-whiteboard-46af9-default-rtdb.firebaseio.com",
            projectId: "my-whiteboard-46af9",
            storageBucket: "my-whiteboard-46af9.firebasestorage.app",
            messagingSenderId: "53282534532",
            appId: "1:53282534532:web:607ee422ca20eb5d053ed1",
            measurementId: "G-DYQWMPDXZM"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const rtdb = getDatabase(app);
        const postsCol = collection(db, 'posts');

        // RTDB에서 보드 목록 가져와서 셀렉트 박스 채우기
        const boardSelect = document.getElementById('boardSelect');
        onValue(ref(rtdb, 'whiteboards'), (snapshot) => {
            const data = snapshot.val() || {};
            boardSelect.innerHTML = '<option value="">캔버스 선택 안 함</option>';
            Object.keys(data).forEach(key => {
                const opt = document.createElement('option');
                opt.value = key;
                opt.textContent = key;
                boardSelect.appendChild(opt);
            });
        });

        // 리스트 실시간 업데이트 (카드 형태)
        const postCardContainer = document.getElementById('postCardContainer');
        const countSpan = document.getElementById('count');
        const q = query(postsCol, orderBy('createdAt', 'desc'));

        onSnapshot(q, (snapshot) => {
            postCardContainer.innerHTML = '';
            countSpan.textContent = snapshot.size;
            if (snapshot.empty) {
                postCardContainer.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:100px; color:var(--text-muted); font-weight:600;">아직 등록된 혁신 기록이 없습니다.</div>';
                return;
            }
            snapshot.forEach((doc) => {
                const post = doc.data();
                const date = post.createdAt ? new Date(post.createdAt.seconds * 1000).toLocaleDateString() : '방금 전';
                
                const card = document.createElement('div');
                card.style.cssText = `
                    background: var(--bg-white); border-radius: 24px; overflow: hidden; 
                    box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid var(--border-color);
                    transition: all 0.3s ease; cursor: pointer; display: flex; flex-direction: column;
                `;
                card.onmouseenter = () => { card.style.transform = 'translateY(-10px)'; card.style.boxShadow = '0 15px 40px rgba(0,0,0,0.08)'; };
                card.onmouseleave = () => { card.style.transform = 'none'; card.style.boxShadow = '0 4px 20px rgba(0,0,0,0.03)'; };

                let imgHtml = '';
                if(post.attachedImage) {
                    imgHtml = `<div style="width:100%; aspect-ratio:16/9; background:#eee; overflow:hidden;">
                        <img src="${post.attachedImage}" style="width:100%; height:100%; object-fit:cover;">
                    </div>`;
                }

                card.innerHTML = `
                    ${imgHtml}
                    <div style="padding: 24px;">
                        <div style="color: var(--accent); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px;">${post.attachedBoard || 'General'}</div>
                        <h3 style="font-size: 1.2rem; font-weight: 800; margin-bottom: 12px; color: var(--text-primary);">${post.title}</h3>
                        <p style="color: var(--text-muted); font-size: 0.95rem; line-height:1.6; margin-bottom: 20px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;">${post.content}</p>
                        <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 15px;">
                            <span style="font-weight: 700; font-size: 0.9rem;">${post.author}</span>
                            <span style="color: var(--text-muted); font-size: 0.8rem;">${date}</span>
                        </div>
                    </div>
                `;
                card.onclick = () => alert(post.content);
                postCardContainer.appendChild(card);
            });
        });

        // 글 등록 로직
        const saveBtn = document.getElementById('savePost');
        saveBtn.addEventListener('click', async () => {
            const title = document.getElementById('postTitle').value;
            const author = document.getElementById('postAuthor').value;
            const content = document.getElementById('postContent').value;
            const selectedBoardId = boardSelect.value;
            
            if(!title || !author || !content) return alert('모든 칸을 채워주세용!');

            saveBtn.disabled = true;
            saveBtn.textContent = '등록 중...';

            let attachedImage = "";
            if(selectedBoardId) {
                const boardSnap = await get(ref(rtdb, `whiteboards/${selectedBoardId}`));
                if(boardSnap.exists()) {
                    attachedImage = boardSnap.val().thumbnail;
                }
            }

            try {
                await addDoc(postsCol, {
                    title, author, content,
                    attachedBoard: selectedBoardId,
                    attachedImage: attachedImage,
                    createdAt: serverTimestamp()
                });
                document.getElementById('writeForm').classList.remove('active');
                document.getElementById('postTitle').value = '';
                document.getElementById('postAuthor').value = '';
                document.getElementById('postContent').value = '';
                boardSelect.value = '';
                alert('혁신 기록이 등록되었습니다!');
            } catch (e) {
                console.error("Error: ", e);
                alert('등록에 실패했습니다. Firebase 권한을 확인해주세요.');
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = '등록하기';
            }
        });

        // UI 토글
        document.getElementById('toggleWrite').addEventListener('click', () => {
            document.getElementById('writeForm').classList.toggle('active');
        });
    </script>
</body>
</html>
